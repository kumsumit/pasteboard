name: pasteboard
description: A flutter plugin which could read image,files from clipboard and write files to clipboard.
version: 0.5.0
homepage: https://github.com/MixinNetwork/flutter-plugins/tree/main/packages/pasteboard

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.1.1
  uuid: ^4.5.3
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: one.mixin.pasteboard
        pluginClass: PasteboardPlugin
      macos:
        pluginClass: PasteboardPlugin
      windows:
        pluginClass: PasteboardPlugin
      linux:
        pluginClass: PasteboardPlugin
      ios:
        pluginClass: PasteboardPlugin
      web:
